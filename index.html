<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヲタ芸DB</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.filter{
text-align:center;
margin-bottom:20px;
}

button{
background:#222;
border:1px solid #555;
color:white;
padding:8px 14px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

button.active{
background:#00ccff;
color:black;
}

input{
padding:8px;
margin-top:10px;
border-radius:6px;
border:1px solid #555;
background:#222;
color:white;
width:220px;
}

.table-wrap{
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
table-layout:fixed;
}

th,td{
border:1px solid #444;
padding:8px;
text-align:center;
word-break:break-word;
white-space:normal;
}

th{
background:#222;
}

/* ===== 列幅（ここが今回のメイン） ===== */

/* 技名（少し広め） */
th:nth-child(1),
td:nth-child(1){
width:20%;
}

/* 拍数（最大3文字） */
th:nth-child(2),
td:nth-child(2){
width:4ch;
}

/* タイプ（最大4文字） */
th:nth-child(3),
td:nth-child(3){
width:6ch;
}

/* それ以降（メモなど）は全部可変 */
th:nth-child(n+4),
td:nth-child(n+4){
width:auto;
}

</style>
</head>

<body>

<h1>ヲタ芸データベース</h1>

<div class="filter">

<div>
<b>タイプ</b><br>

<button onclick="toggleType('基本技')" id="type-基本技">基本技</button>
<button onclick="toggleType('小技')" id="type-小技">小技</button>
<button onclick="toggleType('サビ技')" id="type-サビ技">サビ技</button>
<button onclick="toggleType('合わせ技')" id="type-合わせ技">合わせ技</button>

</div>

<br>

<div>
<b>拍数</b><br>

<button onclick="toggleBeat('2')" id="beat-2">2</button>
<button onclick="toggleBeat('4')" id="beat-4">4</button>
<button onclick="toggleBeat('6')" id="beat-6">6</button>
<button onclick="toggleBeat('8')" id="beat-8">8</button>
<button onclick="toggleBeat('16')" id="beat-16">16</button>
<button onclick="toggleBeat('32')" id="beat-32">32</button>
<button onclick="toggleBeat('other')" id="beat-other">その他</button>

</div>

<br>

<input id="nameSearch" placeholder="技名検索">

<br><br>

<button onclick="resetFilter()">全解除</button>

</div>

<div class="table-wrap">

<table id="dataTable">
<thead>
<tr></tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQwKmHnQdW0QRcrn1yJMpQrFisXyZCRJYj7oM79u58ki2pZTuhUPTVoojq0yRI382N_R9SsnlyahIdU/pub?gid=0&single=true&output=csv&t="+Date.now()

let allData=[]
let headers=[]

let selectedType=null
let selectedBeat=null

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

const rows=data.split(/\r?\n/).map(r=>r.split(","))

headers=rows.shift()

const headRow=document.querySelector("#dataTable thead tr")

headers.forEach(h=>{
const th=document.createElement("th")
th.textContent=h
headRow.appendChild(th)
})

allData=rows

render(allData)

})

function render(data){

const tbody=document.querySelector("#dataTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

if(row.length===1 && row[0]==="") return

const tr=document.createElement("tr")

row.forEach(col=>{
const td=document.createElement("td")
td.textContent=col
tr.appendChild(td)
})

tbody.appendChild(tr)

})

}

function toggleType(type){

selectedType=(selectedType===type)?null:type

document.querySelectorAll("[id^='type-']").forEach(b=>b.classList.remove("active"))

if(selectedType)
document.getElementById("type-"+selectedType).classList.add("active")

applyFilter()

}

function toggleBeat(beat){

selectedBeat=(selectedBeat===beat)?null:beat

document.querySelectorAll("[id^='beat-']").forEach(b=>b.classList.remove("active"))

if(selectedBeat)
document.getElementById("beat-"+selectedBeat).classList.add("active")

applyFilter()

}

function applyFilter(){

const name=document.getElementById("nameSearch").value.toLowerCase()

const result=allData.filter(row=>{

const tech=(row[0]||"").toLowerCase()
const beat=row[1]
const type=row[2]

let nameMatch=tech.includes(name)

let beatMatch=true
let typeMatch=true

if(selectedType)
typeMatch=(type===selectedType)

if(selectedBeat){

if(selectedBeat==="other"){
beatMatch=!["2","4","6","8","16","32"].includes(beat)
}
else{
beatMatch=(beat===selectedBeat)
}

}

return nameMatch && beatMatch && typeMatch

})

render(result)

}

function resetFilter(){

selectedType=null
selectedBeat=null

document.getElementById("nameSearch").value=""

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"))

render(allData)

}

document.getElementById("nameSearch").addEventListener("input",applyFilter)

</script>

</body>
</html>
